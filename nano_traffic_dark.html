<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>nano. traffic</title>
<style>

  :root { --bg:#0b0b0c; --card:#171719; --card2:#1b1b1f; --line:#2a2a2e; --text:#f5f5f7; --muted:#8b8b92; --green:#29d36b; --red:#ff4d4f; --yellow:#ffcc00; }
  * { box-sizing:border-box }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif; background:radial-gradient(circle at top,#19191d 0%,var(--bg) 46%,#070708 100%); color:var(--text); min-height:100vh; }
  header { min-height:118px; display:flex; align-items:center; justify-content:space-between; padding:28px 36px 22px; border-bottom:1px solid var(--line); background:rgba(10,10,12,.72); backdrop-filter:blur(18px); position:sticky; top:0; z-index:5; }
  .brand { display:flex; align-items:end; gap:22px; }
  .logo { width:250px; height:66px; object-fit:contain; object-position:left center; display:block; }
  .traffic { font-size:46px; font-weight:400; letter-spacing:-1.2px; line-height:1; color:var(--text); padding-bottom:5px; }
  .gear { border:0; background:#252529; color:#fff; font-size:26px; cursor:pointer; width:52px; height:52px; border-radius:16px; line-height:1; display:flex; align-items:center; justify-content:center; }
  main { padding:44px 30px 32px; }
  .grid { display:grid; grid-template-columns:repeat(4, minmax(230px,1fr)); gap:24px; max-width:1320px; margin:0 auto; }
  .card { background:linear-gradient(180deg,var(--card2),var(--card)); border:1px solid var(--line); border-radius:28px; min-height:600px; box-shadow:0 20px 60px rgba(0,0,0,.26); overflow:hidden; display:flex; flex-direction:column; }
  .card-inner { padding:34px 30px 22px; flex:1; }
  .route-name { font-size:25px; font-weight:850; letter-spacing:-.4px; margin:0 0 26px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }
  .rule { height:1px; background:var(--line); margin-bottom:34px; }
  .places { display:grid; grid-template-columns:28px 1fr; column-gap:15px; row-gap:16px; align-items:center; min-height:142px; }
  .circle { width:22px; height:22px; border:3px solid var(--text); border-radius:50%; }
  .pin { font-size:29px; line-height:1; transform:translateX(-3px); color:var(--text); }
  .dots { grid-column:1; width:0; height:52px; border-left:6px dotted #6f737d; margin-left:10px; }
  .addr { font-size:22px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }
  .time { margin-top:46px; font-weight:950; letter-spacing:-4px; line-height:.9; }
  .time .num { font-size:88px; }
  .time .unit { font-size:44px; margin-left:8px; letter-spacing:-1px; }
  .normal { margin-top:24px; color:var(--muted); font-size:20px; }
  .status { margin-top:34px; border-radius:14px; padding:15px 18px; font-size:20px; font-weight:850; display:flex; align-items:center; gap:14px; border:1px solid; }
  .status .dot { width:14px; height:14px; border-radius:50%; display:inline-block; flex:0 0 auto; }
  .green { color:var(--green); } .red { color:var(--red); } .yellow { color:var(--yellow); }
  .status.green { background:rgba(41,211,107,.12); border-color:rgba(41,211,107,.35); } .status.red { background:rgba(255,77,79,.12); border-color:rgba(255,77,79,.35); } .status.yellow { background:rgba(255,204,0,.12); border-color:rgba(255,204,0,.35); }
  .status.green .dot { background:var(--green); box-shadow:0 0 18px rgba(41,211,107,.45); } .status.red .dot { background:var(--red); box-shadow:0 0 18px rgba(255,77,79,.45); } .status.yellow .dot { background:var(--yellow); box-shadow:0 0 18px rgba(255,204,0,.45); }
  .open { border-top:1px solid var(--line); padding:18px 28px; text-decoration:none; color:var(--text); font-size:19px; display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,.015); }
  .open span:first-child { display:flex; gap:12px; align-items:center; color:var(--text); }
  .arrow { font-size:34px; line-height:1; color:var(--text); }
  .footer { text-align:center; color:var(--muted); font-size:18px; margin-top:44px; }
  .empty { opacity:.5; }
  dialog { width:min(920px, calc(100vw - 40px)); border:1px solid var(--line); border-radius:24px; box-shadow:0 30px 100px rgba(0,0,0,.55); padding:0; background:#101012; color:var(--text); }
  dialog::backdrop { background:rgba(0,0,0,.62); backdrop-filter:blur(6px); }
  .panel { padding:24px; }
  .panel-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
  .panel h2 { margin:0; font-size:24px; letter-spacing:-.4px; }
  .close { border:0; background:#2a2a2e; color:#fff; border-radius:999px; width:38px; height:38px; font-size:22px; cursor:pointer; }
  label { display:block; font-size:11px; text-transform:uppercase; color:var(--muted); font-weight:850; letter-spacing:.9px; margin-bottom:6px; }
  input { width:100%; border:1px solid var(--line); background:#09090a; color:var(--text); border-radius:14px; padding:13px 14px; font-size:16px; outline:none; }
  input:focus { border-color:#65656d; background:#0f0f11; }
  .api { margin-bottom:14px; }
  .routes { display:grid; gap:10px; }
  .edit-row { display:grid; grid-template-columns:1fr 1.25fr 1.25fr; gap:10px; padding:12px; border:1px solid var(--line); border-radius:18px; background:#171719; }
  .actions { display:flex; justify-content:flex-end; gap:10px; margin-top:18px; }
  .btn { border:0; border-radius:14px; padding:13px 18px; font-size:16px; font-weight:850; cursor:pointer; }
  .btn.secondary { background:#2a2a2e; color:#fff; } .btn.primary { background:#fff; color:#000; }
  .hint { color:var(--muted); font-size:13px; margin:10px 0 0; }
  @media (max-width:1100px) { .grid { grid-template-columns:repeat(2,1fr); } header { min-height:104px; } .traffic { font-size:40px; } .logo { width:215px; } }
  @media (max-width:640px) { header { padding:22px 18px; } .brand{gap:14px}.logo { width:145px; height:42px; } .traffic { font-size:32px; padding-bottom:2px; } .grid { grid-template-columns:1fr; gap:18px; } .card { min-height:auto; } .edit-row { grid-template-columns:1fr; } main{padding:22px 16px 28px;} }

</style>
</head>

    if (has && ratio>1.2) { cls='red'; txt='+'+Math.round((ratio-1)*100)+' % länger'; }
    else if (has && ratio>1.1) { cls='yellow'; txt='+'+Math.round((ratio-1)*100)+' % länger'; }
    const time=has ? d.trafficMin : '–'; const normal= d.normalMin ? 'Normal: '+d.normalMin+' min' : 'Normal: –';
    const err=d.error ? '<div class="normal">'+d.error+'</div>' : '<div class="normal">'+normal+'</div>';
    grid.insertAdjacentHTML('beforeend', `
      <article class="card ${has?'':'empty'}">
        <div class="card-inner">
          <h3 class="route-name">${escapeHtml(r.name||'Weg '+(i+1))}</h3><div class="rule"></div>
          <div class="places"><div class="circle"></div><div class="addr">${escapeHtml(shortPlace(r.start))}</div><div class="dots"></div><div></div><div class="pin">⌖</div><div class="addr">${escapeHtml(shortPlace(r.end))}</div></div>
          <div class="time ${cls}"><span class="num">${time}</span><span class="unit">min</span></div>${err}
          <div class="status ${cls}"><span class="dot"></span><span>${has?txt:'Warte auf Daten'}</span></div>
        </div>
        <a class="open" href="${mapsUrl(r)}" target="_blank"><span>⌖ Route öffnen</span><span class="arrow">→</span></a>
      </article>`);
  });
}
function escapeHtml(str) { return String(str||'').replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function renderEditors() {
  document.getElementById('apiKey').value=state.apiKey||'';
  const box=document.getElementById('routeEditors'); box.innerHTML='';
  for(let i=0;i<4;i++) { const r=state.routes[i]||{name:'',start:'',end:''}; box.insertAdjacentHTML('beforeend', `
    <div class="edit-row">
      <div><label>Wegname</label><input data-i="${i}" data-k="name" value="${escapeHtml(r.name)}" placeholder="Zuhause → Büro"></div>
      <div><label>Start</label><input data-i="${i}" data-k="start" value="${escapeHtml(r.start)}" placeholder="Adresse oder Ort"></div>
      <div><label>Ziel</label><input data-i="${i}" data-k="end" value="${escapeHtml(r.end)}" placeholder="Adresse oder Ort"></div>
    </div>`); }
}
function collectEditors() {
  state.apiKey=document.getElementById('apiKey').value.trim();
  const routes=[{},{},{},{}];
  document.querySelectorAll('[data-i]').forEach(inp=>{ routes[+inp.dataset.i][inp.dataset.k]=inp.value.trim(); });
  state.routes=routes.filter(r=>r.name||r.start||r.end).slice(0,4);
}
function loadGoogle() { return new Promise((resolve,reject)=>{
  if(window.google?.maps) return resolve();
  if(!state.apiKey) return reject(new Error('API-Key fehlt'));
  if(mapsLoading) { const t=setInterval(()=>{ if(window.google?.maps) {clearInterval(t); resolve();} },200); return; }
  mapsLoading=true; window.__nanoMapsReady=()=>resolve();
  const s=document.createElement('script'); s.src='https://maps.googleapis.com/maps/api/js?key='+encodeURIComponent(state.apiKey)+'&callback=__nanoMapsReady'; s.async=true; s.onerror=()=>reject(new Error('Google Maps konnte nicht geladen werden')); document.head.appendChild(s);
}); }
async function updateTimes() {
  renderCards();
  try { await loadGoogle(); } catch(e) { renderCards(Object.fromEntries(state.routes.map((_,i)=>[i,{error:e.message}]))); return; }
  const service=new google.maps.DistanceMatrixService(); const results={};
  await Promise.all(state.routes.map((r,i)=> new Promise(resolve=>{
    if(!r.start||!r.end) { results[i]={error:'Start/Ziel fehlt'}; return resolve(); }
    service.getDistanceMatrix({ origins:[r.start], destinations:[r.end], travelMode:'DRIVING', drivingOptions:{departureTime:new Date(), trafficModel:'bestguess'}, unitSystem:google.maps.UnitSystem.METRIC }, (res,status)=>{
      if(status!=='OK') results[i]={error:status}; else { const el=res.rows?.[0]?.elements?.[0]; if(!el||el.status!=='OK') results[i]={error:el?.status||'Keine Route'}; else results[i]={ normalMin:Math.round(el.duration.value/60), trafficMin:Math.round((el.duration_in_traffic?.value||el.duration.value)/60) }; }
      resolve();
    });
  })));
  renderCards(results);
  document.getElementById('footer').textContent='↻ Aktualisiert: '+new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}
document.getElementById('settingsBtn').onclick=()=>{renderEditors(); document.getElementById('settings').showModal();};
document.getElementById('closeBtn').onclick=()=>document.getElementById('settings').close();
document.getElementById('saveBtn').onclick=()=>{ collectEditors(); saveState(); document.getElementById('settings').close(); updateTimes(); };
document.getElementById('refreshBtn').onclick=()=>{ collectEditors(); saveState(); updateTimes(); };
renderCards(); renderEditors(); if(!state.apiKey) document.getElementById('settings').showModal(); else updateTimes();
setInterval(updateTimes, 5*60*1000);
</script>
</body>
</html>
