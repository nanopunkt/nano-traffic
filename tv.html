<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>nano. traffic TV</title>
<style>
:root{--bg:#050506;--card:#171719;--card2:#111114;--line:#2a2a2e;--text:#f5f5f7;--muted:#96969d;--green:#29d36b;--red:#ff4d4f;--yellow:#ffcc00}
*{box-sizing:border-box} html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#050506;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif} body{background:radial-gradient(circle at 50% 0%,#18181d 0%,#070708 48%,#030304 100%)}
.app{height:100vh;width:100vw;padding:28px 52px 36px;display:flex;flex-direction:column;gap:22px}.top{height:74px;display:flex;align-items:center;justify-content:space-between;flex:0 0 auto}.brand{display:flex;align-items:baseline;gap:18px;white-space:nowrap}.nano{font-weight:950;letter-spacing:-.065em;font-size:58px;line-height:.9}.traffic{font-size:40px;font-weight:400;letter-spacing:-.06em}.gear{border:0;background:#202025;color:#fff;width:52px;height:52px;border-radius:16px;font-size:28px;cursor:pointer}.grid{flex:1;display:grid;gap:26px;min-height:0}.grid.count1{grid-template-columns:1fr}.grid.count2{grid-template-columns:repeat(2,1fr)}.grid.count3,.grid.count4{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,minmax(0,1fr))}.card{position:relative;min-height:0;background:linear-gradient(180deg,#1d1d21 0%,#141416 100%);border:1px solid var(--line);border-radius:30px;box-shadow:0 28px 70px rgba(0,0,0,.42);overflow:hidden;display:grid;grid-template-rows:1fr}.cardInner{
  position:relative;
  z-index:3;
  padding:26px 34px 22px;
  min-width:0;

  text-shadow:
    0 2px 8px rgba(0,0,0,.95),
    0 8px 24px rgba(0,0,0,.85),
    0 0 40px rgba(0,0,0,.75);
}.cardInner::before{
  content:"";
  position:absolute;

  left:-20px;
  top:-20px;
  bottom:-20px;

  width:55%;

  background:rgba(5,5,6,.15);

  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  border-radius:24px;

  z-index:-1;
}
.routeName{font-weight:950;letter-spacing:-.055em;line-height:1.02;font-size:clamp(32px,3.05vw,58px);white-space:normal;overflow:visible}.rule{height:1px;background:var(--line);margin:18px 0 16px}.places{display:grid;grid-template-columns:26px 1fr;column-gap:14px;row-gap:9px;align-items:center;color:#f1f1f3}.ico{font-size:24px;line-height:1;text-align:center;color:#fff}.dots{grid-column:1;color:#84848c;font-size:29px;line-height:.65;letter-spacing:2px;writing-mode:vertical-rl;height:40px;justify-self:center}.addr{font-size:clamp(18px,1.45vw,28px);font-weight:700;line-height:1.2;white-space:normal;overflow-wrap:anywhere}.timeRow{display:flex;align-items:flex-end;gap:14px;margin-top:18px}.num{font-size:clamp(82px,8.4vw,170px);font-weight:950;letter-spacing:-.08em;line-height:.82}.unit{font-size:clamp(30px,3.1vw,64px);font-weight:950;letter-spacing:-.065em;line-height:.95;margin-bottom:.12em}.good .num,.good .unit,.good .badge{color:var(--green)}.bad .num,.bad .unit,.bad .badge{color:var(--red)}.medium .num,.medium .unit,.medium .badge{color:var(--yellow)}.loading .num,.loading .unit,.loading .badge{color:var(--muted)}.normal{font-size:clamp(16px,1.35vw,26px);font-weight:750;color:var(--muted);margin-top:10px}.badge{margin-top:14px;border-radius:16px;border:1px solid currentColor;background:rgba(41,211,107,.14);display:inline-flex;align-items:center;gap:10px;padding:12px 18px;font-size:clamp(15px,1.15vw,22px);font-weight:900}.badge:before{content:"";width:12px;height:12px;border-radius:99px;background:currentColor}.mapBox{position:absolute;inset:0;margin:0;border-radius:30px;overflow:hidden;border:0;background:#0b0b0d;z-index:1;opacity:.80;filter:saturate(1.15) contrast(1.15)}.mapBox:after{content:"";position:absolute;inset:0;z-index:2;background:linear-gradient(90deg,rgba(10,10,12,.65) 0%,rgba(10,10,12,.45) 38%,rgba(10,10,12,.25) 72%,rgba(10,10,12,.45) 100%),linear-gradient(180deg,rgba(10,10,12,.30),rgba(10,10,12,.55))}.map{height:100%;min-height:100%}.mapLabel{position:absolute;right:22px;bottom:22px;z-index:5;padding:8px 12px;border-radius:999px;background:rgba(5,5,6,.72);backdrop-filter:blur(8px);font-size:12px;letter-spacing:.08em;font-weight:950;color:#fff}.heroMap .cardInner{text-shadow:0 12px 36px rgba(0,0,0,.6)}.count1 .card{grid-template-columns:1fr;grid-template-rows:1fr}.count1 .cardInner{padding:76px 72px 54px;max-width:980px}.count1 .routeName{font-size:clamp(58px,5.2vw,92px)}.count1 .rule{margin:28px 0 26px}.count1 .addr{font-size:clamp(28px,2vw,40px)}.count1 .dots{height:72px;font-size:42px}.count1 .timeRow{margin-top:42px}.count1 .num{font-size:clamp(170px,15vw,270px)}.count1 .unit{font-size:clamp(64px,5.2vw,98px)}.count1 .normal{font-size:34px}.count1 .badge{font-size:30px;padding:15px 26px}.count1 .mapBox{inset:0;margin:0;height:auto}.count2 .card{grid-template-rows:auto 165px}.count3 .card,.count4 .card{grid-template-rows:auto 118px}.count3 .cardInner,.count4 .cardInner{padding:24px 30px 22px}.count3 .routeName,.count4 .routeName{font-size:clamp(28px,2.15vw,44px)}.count3 .rule,.count4 .rule{margin:12px 0 10px}.count3 .addr,.count4 .addr{font-size:clamp(15px,1.02vw,22px)}.count3 .dots,.count4 .dots{height:28px;font-size:22px}.count3 .timeRow,.count4 .timeRow{margin-top:10px}.count3 .num,.count4 .num{font-size:clamp(68px,5.3vw,118px)}.count3 .unit,.count4 .unit{font-size:clamp(26px,2.1vw,44px)}.count3 .normal,.count4 .normal{font-size:18px;margin-top:4px}.count3 .badge,.count4 .badge{font-size:17px;padding:8px 14px;margin-top:8px;border-radius:13px}.count3 .mapBox,.count4 .mapBox{margin:0 30px 20px}.foot{height:34px;display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:22px;font-weight:650;flex:0 0 auto}.clock{font-size:28px;color:#fff;font-weight:900}.panel{position:fixed;right:34px;top:112px;width:min(640px,calc(100vw - 68px));max-height:calc(100vh - 150px);overflow:auto;background:#111114;border:1px solid var(--line);border-radius:24px;box-shadow:0 30px 80px rgba(0,0,0,.6);padding:20px;display:none;z-index:100}.panel.open{display:block}.panel h2{margin:0 0 14px;font-size:22px}.presets{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.addrPresets{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 14px}.addrTitle{font-size:13px;color:var(--muted);font-weight:800;margin:6px 0 8px}.preset,.addrBtn{border:1px solid #34343a;background:#1c1c20;color:#fff;border-radius:999px;padding:9px 12px;font-weight:800;font-size:13px}.addrBtn.primary{background:#183724;border-color:#2f8f50;color:#76f0a2}.row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;margin-bottom:8px}.row input,.key{background:#070708;border:1px solid #303036;color:#fff;border-radius:12px;padding:11px;font-size:13px}.keyrow{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:14px}.btn{border:0;border-radius:12px;background:#fff;color:#000;font-weight:900;padding:11px 14px;cursor:pointer}.del{background:#2a2a2e;color:#fff;border:0;border-radius:12px;padding:0 12px;font-size:18px}.hint{font-size:13px;line-height:1.35;color:var(--muted);margin-top:10px}.gm-style{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif!important}.gm-style-cc,.gmnoprint a,.gmnoprint span{opacity:.35!important}
</style>
</head><body>
<div class="app">
  <header class="top"><div class="brand"><div class="nano">nano.</div><div class="traffic">traffic</div></div><button class="gear" onclick="toggleSettings()">⚙︎</button></header>
  <main id="grid" class="grid"></main>
  <footer class="foot"><div id="updated">Lade Fahrzeiten …</div><div class="clock" id="clock">--:--</div></footer>
</div>
<section class="panel" id="settings"><h2>Wege bearbeiten</h2><div class="keyrow"><input class="key" id="apiKey" placeholder="Google API-Key"><button class="btn" onclick="saveApiKey()">Key speichern</button></div><div class="addrTitle">Adresse in aktives Start/Ziel-Feld einsetzen</div><div class="addrPresets" id="addrPresets"></div><div class="addrTitle">Komplette Wege</div><div class="presets" id="presets"></div><div id="routeRows"></div><button class="btn" onclick="addEmptyRoute()">+ Eigene Route</button><div class="hint">Erst in ein Start- oder Ziel-Feld klicken, dann z.B. „Zuhause“ oder „nano Lager“. Die kompletten Wege füllen Wegname, Start und Ziel automatisch. Maximal 4 aktive Wege.</div></section>
<script>
const ADDR={home:"Hermann-Becker-Str. 10, 50672 Köln",rtl:"Picassoplatz 1, 50679 Köln",lager:"Methweg 22, 50672 Köln",mmc:"Butzweilerstraße 255, 50829 Köln",mediatec:"Widdersdorfer Str. 217, 50825 Köln",kaffeesaurus:"Friesenpl. 15, 50672 Köln"
};
const PRESETS=[
 {name:"Zuhause → nano Lager",start:ADDR.home,target:ADDR.lager},{name:"Zuhause → RTL",start:ADDR.home,target:ADDR.rtl},{name:"Zuhause → Mediatec",start:ADDR.home,target:ADDR.mediatec},{name:"Zuhause → MMC",start:ADDR.home,target:ADDR.mmc},
 {name:"nano Lager → RTL",start:ADDR.lager,target:ADDR.rtl},{name:"RTL → nano Lager",start:ADDR.rtl,target:ADDR.lager},{name:"nano Lager → Mediatec",start:ADDR.lager,target:ADDR.mediatec},{name:"Mediatec → nano Lager",start:ADDR.mediatec,target:ADDR.lager},{name:"MMC → RTL",start:ADDR.mmc,target:ADDR.rtl},{name:"RTL → MMC",start:ADDR.rtl,target:ADDR.mmc}
];
const ADDRESS_PRESETS=[
 {label:"Zuhause",value:ADDR.home,primary:true},
 {label:"nano Lager",value:ADDR.lager,primary:true},
 {label:"RTL",value:ADDR.rtl},
 {label:"MMC",value:ADDR.mmc},
 {label:"Mediatec",value:ADDR.mediatec},
 {label:"☕ Kaffeesaurus",value:ADDR.kaffeesaurus}
];
const DEFAULT=[PRESETS[0]];let mapsReady=false,mapsLoading=false,currentRoutes=[],mapObjs=[],activeAddrInput=null;
const styles=[{elementType:"geometry",stylers:[{color:"#0c0d10"}]},{elementType:"labels.text.stroke",stylers:[{color:"#0c0d10"}]},{elementType:"labels.text.fill",stylers:[{color:"#7f8594"}]},{featureType:"road",elementType:"geometry",stylers:[{color:"#20242b"}]},{featureType:"road",elementType:"labels.icon",stylers:[{visibility:"off"}]},{featureType:"road.highway",elementType:"geometry",stylers:[{color:"#2a3038"}]},{featureType:"water",elementType:"geometry",stylers:[{color:"#08090b"}]},{featureType:"poi",stylers:[{visibility:"off"}]},{featureType:"transit",stylers:[{visibility:"off"}]},{featureType:"administrative",elementType:"geometry",stylers:[{color:"#1f232a"}]}];
function loadRoutes(){try{return JSON.parse(localStorage.getItem("routes_v3")||localStorage.getItem("routes_v2"))||DEFAULT}catch{return DEFAULT}}
function saveRoutesData(r){localStorage.setItem("routes_v3",JSON.stringify(r.slice(0,4)));localStorage.setItem("nanoTrafficBackup",JSON.stringify({routes:r.slice(0,4),key:loadKey(),ts:Date.now()}))}
function loadKey(){
  return localStorage.getItem("google_maps_api_key")
    || localStorage.getItem("nano_google_key")
    || "";
}
function saveKey(k){localStorage.setItem("google_maps_api_key",k);localStorage.setItem("nano_google_key",k)}
function esc(s){return String(s??"").replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function clean(a){return String(a||"").replace(/, Deutschland$/i,"")}
function mapsUrl(s,t){return`https://www.google.com/maps/dir/?api=1&travelmode=driving&origin=${encodeURIComponent(s)}&destination=${encodeURIComponent(t)}`}
function formatDuration(mins){
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);

  if(h === 0) return mins;

  return `${h}:${String(m).padStart(2,"0")}`;
}
function stat(m,n){let r=m/Math.max(1,n);return r<=1.12?{c:"good",t:"Alles frei"}:r<=1.28?{c:"medium",t:`+${Math.round((r-1)*100)} % länger`}:{c:"bad",t:`+${Math.round((r-1)*100)} % länger`}}
function tick(){clock.textContent=new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}setInterval(tick,1000);tick();
function render(){currentRoutes=loadRoutes().filter(r=>r.start&&r.target).slice(0,4);if(!currentRoutes.length)currentRoutes=DEFAULT;grid.className=`grid count${currentRoutes.length}`;grid.innerHTML="";mapObjs=[];currentRoutes.forEach((r,i)=>{let el=document.createElement("article");el.className="card loading";el.id=`card-${i}`;el.innerHTML=`<div class="cardInner"><div class="routeName">${esc(r.name||`${r.start} → ${r.target}`)}</div><div class="rule"></div><div class="places"><div class="ico">○</div><div class="addr">${esc(clean(r.start))}</div><div class="dots">••••</div><div></div><div class="ico">⌖</div><div class="addr">${esc(clean(r.target))}</div></div><div class="timeRow"><div class="num" id="num-${i}">…</div><div class="unit" id="unit-${i}">min</div></div><div class="normal" id="normal-${i}">Normal: –</div><div class="badge" id="badge-${i}">Lädt</div></div><div class="mapBox"><div class="mapLabel" id="mapLabel-${i}">ROUTE + VERKEHR</div><div class="map" id="map-${i}"></div></div>`;grid.appendChild(el)});updated.textContent="Lade Fahrzeiten …"}
function loadGoogle(){let k=loadKey();if(!k){updated.textContent="API-Key fehlt · ⚙︎ öffnen";return} if(mapsReady){refreshAll();return} if(mapsLoading)return;mapsLoading=true;let old=document.getElementById("gmaps");if(old)old.remove();let s=document.createElement("script");s.id="gmaps";s.async=true;s.defer=true;s.src=`https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(k)}&callback=initMaps`;s.onerror=()=>updated.textContent="Google Maps konnte nicht geladen werden";document.head.appendChild(s)}
window.initMaps=()=>{mapsReady=true;mapsLoading=false;refreshAll()};
function refreshAll(){render();if(!loadKey()){updated.textContent="API-Key fehlt · ⚙︎ öffnen";return}if(!mapsReady){loadGoogle();return}const dm=new google.maps.DistanceMatrixService();currentRoutes.forEach((r,i)=>{dm.getDistanceMatrix({origins:[r.start],destinations:[r.target],travelMode:google.maps.TravelMode.DRIVING,drivingOptions:{departureTime:new Date(),trafficModel:google.maps.TrafficModel.BEST_GUESS},unitSystem:google.maps.UnitSystem.METRIC},(res,status)=>{if(status!=="OK"){setErr(i,status);return}let e=res.rows?.[0]?.elements?.[0];if(!e||e.status!=="OK"){setErr(i,e?.status||"Route nicht gefunden");return}let m=Math.max(1,Math.round((e.duration_in_traffic?.value||e.duration.value)/60));let n=Math.max(1,Math.round(e.duration.value/60));let s=stat(m,n);document.getElementById(`card-${i}`).className=`card ${s.c}`;
document.getElementById(`num-${i}`).textContent=formatDuration(m);
document.getElementById(`unit-${i}`).textContent = m >= 60 ? "h" : "min";
document.getElementById(`normal-${i}`).textContent =
  `Normal: ${formatDuration(n)} ${n >= 60 ? "h" : "min"}`;document.getElementById(`badge-${i}`).textContent=s.t;updated.textContent="↻ Aktualisiert: "+new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});});if(i===0) drawMap(r,i)})}
function setErr(i,msg){let b=document.getElementById(`badge-${i}`); if(b)b.textContent=msg; let ml=document.getElementById(`mapLabel-${i}`); if(ml)ml.textContent=String(msg).toUpperCase()}
function drawMap(r,i){let box=document.getElementById(`map-${i}`);if(!box)return;let map=new google.maps.Map(box,{zoom:12,center:{lat:50.9375,lng:6.9603},disableDefaultUI:true,styles,gestureHandling:"none",keyboardShortcuts:false});new google.maps.TrafficLayer().setMap(map);let renderer=new google.maps.DirectionsRenderer({map,preserveViewport:false,suppressMarkers:false,polylineOptions:{strokeColor:"#29d36b",strokeOpacity:1,strokeWeight:9},markerOptions:{opacity:.95}});let svc=new google.maps.DirectionsService();svc.route({origin:r.start,destination:r.target,travelMode:google.maps.TravelMode.DRIVING,drivingOptions:{departureTime:new Date(),trafficModel:google.maps.TrafficModel.BEST_GUESS},provideRouteAlternatives:false},(result,status)=>{let label=document.getElementById(`mapLabel-${i}`);if(status==="OK"){renderer.setDirections(result); if(label)label.textContent="ROUTE + VERKEHR"; setTimeout(()=>google.maps.event.trigger(map,"resize"),200)}else{if(label)label.textContent="ROUTE NICHT SICHTBAR · "+status}})}
function toggleSettings(){settings.classList.toggle("open");renderSettings()}
function renderSettings(){apiKey.value=loadKey();addrPresets.innerHTML="";ADDRESS_PRESETS.forEach(a=>{let b=document.createElement("button");b.className="addrBtn"+(a.primary?" primary":"");b.textContent=a.label;b.onclick=()=>insertAddress(a.value);addrPresets.appendChild(b)});presets.innerHTML="";PRESETS.forEach(p=>{let b=document.createElement("button");b.className="preset";b.textContent=p.name;b.onclick=()=>addPreset(p);presets.appendChild(b)});drawRows()}
function drawRows(){let rows=routeRows;rows.innerHTML="";loadRoutes().slice(0,4).forEach((r,i)=>{let row=document.createElement("div");row.className="row";row.innerHTML=`<input data-i="${i}" data-k="name" placeholder="Wegname" value="${esc(r.name||"")}"><input data-i="${i}" data-k="start" placeholder="Start" value="${esc(r.start||"")}"><input data-i="${i}" data-k="target" placeholder="Ziel" value="${esc(r.target||"")}"><button class="del" onclick="delRoute(${i})">×</button>`;rows.appendChild(row)});rows.querySelectorAll("input").forEach(inp=>{inp.oninput=saveFromRows; if(inp.dataset.k==="start"||inp.dataset.k==="target") inp.onfocus=()=>activeAddrInput=inp})}
function saveFromRows(){let r=[];document.querySelectorAll("#routeRows .row").forEach(row=>{let name=row.querySelector('[data-k="name"]').value.trim(),start=row.querySelector('[data-k="start"]').value.trim(),target=row.querySelector('[data-k="target"]').value.trim();if(start&&target)r.push({name,start,target})});saveRoutesData(r);refreshAll()}
function insertAddress(value){
  if(!activeAddrInput || !document.body.contains(activeAddrInput)){
    const inputs=[...document.querySelectorAll('#routeRows input[data-k="start"],#routeRows input[data-k="target"]')];
    activeAddrInput=inputs.find(x=>!x.value.trim())||inputs[0]||null;
  }
  if(!activeAddrInput){
    addEmptyRoute();
    activeAddrInput=document.querySelector('#routeRows input[data-k="start"]');
  }
  activeAddrInput.value=value;
  activeAddrInput.focus();
  saveFromRows();
}
function addPreset(p){let r=loadRoutes().filter(x=>x.start&&x.target);if(r.length>=4)r.shift();r.push({...p});saveRoutesData(r);drawRows();refreshAll()}
function delRoute(i){let r=loadRoutes();r.splice(i,1);saveRoutesData(r);drawRows();refreshAll()}
function addEmptyRoute(){let r=loadRoutes();if(r.length<4)r.push({name:"",start:"",target:""});saveRoutesData(r);drawRows()}
function saveApiKey(){saveKey(apiKey.value.trim());mapsReady=false;mapsLoading=false;refreshAll()}
render();renderSettings();loadGoogle();setInterval(refreshAll,5*60*1000);let tm;document.addEventListener("mousemove",()=>{document.body.style.cursor="default";clearTimeout(tm);tm=setTimeout(()=>document.body.style.cursor="none",5000)});
</script>
</body></html>
